<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gerador</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f7; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f7; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 4px solid #e0e0e0; border-top-color: #1a56e8; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner"></div></div>
    <div id="root"></div>
    
    <script>
        (function() {
            'use strict';
            
            // ===== PROTEÇÃO PROFISSIONAL =====
            const ALLOWED_DOMAINS = ['gerador-ts.vercel.app', 'localhost', '127.0.0.1'];
            const currentDomain = window.location.hostname;
            const isAllowed = ALLOWED_DOMAINS.some(d => currentDomain === d || currentDomain.endsWith(d));
            const isLocalFile = window.location.protocol === 'file:';
            
            if (!isAllowed && !isLocalFile) {
                document.body.innerHTML = '<h1 style="text-align:center;margin-top:50px;color:#999;">⚠️ Acesso Negado</h1>';
                throw new Error('Unauthorized domain');
            }
            
            // Anti-debugging
            setInterval(() => {
                const start = performance.now();
                debugger;
                if (performance.now() - start > 100) {
                    document.body.innerHTML = '<h1 style="text-align:center;margin-top:50px;color:#999;">⚠️ Acesso Negado</h1>';
                    throw new Error('DevTools detected');
                }
            }, 1000);
            
            // Disable interactions
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('copy', e => e.preventDefault());
            document.addEventListener('cut', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) || (e.ctrlKey && (e.key === 's' || e.key === 'u'))) {
                    e.preventDefault();
                }
            });
            
            // Carregar app.json e renderizar
            window.addEventListener('DOMContentLoaded', () => {
                Promise.all([
                    fetch('/app.json').then(r => r.json()),
                    fetch('/app.js').then(r => r.text())
                ]).then(([data, jsCode]) => {
                    const root = document.getElementById('root');
                    root.innerHTML = data.html;
                    document.getElementById('loading').style.display = 'none';
                    
                    // Executar JavaScript
                    eval(jsCode);
                }).catch(err => {
                    console.error('Erro:', err);
                    document.getElementById('root').innerHTML = '<h1>Erro ao carregar aplicação</h1>';
                });
            });
        })();
    </script>
</body>
</html>
