<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 { font-size: 32px; margin-bottom: 20px; }
        p { font-size: 16px; opacity: 0.9; margin-bottom: 30px; }
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Gerador</h1>
        <p>Carregando aplicação...</p>
        <div class="loader"></div>
    </div>
    
    <script>
        // Este é um arquivo de proteção
        // O conteúdo real é carregado dinamicamente
        
        // Detectar tentativas de clonagem
        if (document.documentElement.outerHTML.length < 5000) {
            // Se o arquivo foi clonado/copiado, mostrar apenas este HTML vazio
            console.log('Arquivo protegido - clonagem detectada');
        }
        
        // Carregar conteúdo real após validação
        window.addEventListener('load', () => {
            // Verificar integridade
            fetch('/api/validate').then(r => r.json()).then(data => {
                if (data.valid) {
                    // Carregar aplicação real
                    location.href = '/app';
                }
            }).catch(() => {
                // Fallback
                setTimeout(() => {
                    location.href = '/app';
                }, 2000);
            });
        });
    </script>
</body>
</html>
