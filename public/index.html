    <script type="text/babel">
        // ===== PROTEÇÃO PROFISSIONAL =====
        (function() {
            'use strict';
            
            const ALLOWED_DOMAINS = ['gerador-ts.vercel.app', 'localhost', '127.0.0.1'];
            const currentDomain = window.location.hostname;
            const isAllowed = ALLOWED_DOMAINS.some(d => currentDomain === d || currentDomain.endsWith(d));
            
            if (!isAllowed && window.location.protocol !== 'file:') {
                document.body.innerHTML = '<h1 style="text-align:center;margin-top:50px;color:#999;">⚠️ Acesso Negado</h1>';
                throw new Error('Unauthorized domain');
            }
            
            setInterval(() => {
                const start = performance.now();
                debugger;
                if (performance.now() - start > 100) {
                    document.body.innerHTML = '<h1 style="text-align:center;margin-top:50px;color:#999;">⚠️ Acesso Negado</h1>';
                }
            }, 1000);
            
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('copy', e => e.preventDefault());
            document.addEventListener('cut', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) || (e.ctrlKey && (e.key === 's' || e.key === 'u'))) {
                    e.preventDefault();
                }
            });
        })();

        // ===== APLICAÇÃO PRINCIPAL =====
        const STORAGE_KEYS = {
            keys: 'app_keys',
            apiKeys: 'app_api_keys',
            packages: 'app_packages',
            limit: 'app_limit',
            chartData: 'app_chart_data',
            deleted: 'app_deleted_ids'
        };

        const KEY_LIMIT = 50;
        let generatedKeys = [];
        let apiKeys = [];
        let packages = [];
        let limitCount = 0;
        let chartData = {};
        let deletedIds = new Set();
        let currentPage = 'home';
        let activeDeviceKey = null;

        // Carregar dados
        function load(key, defaultVal = null) {
            try {
                const val = localStorage.getItem(key);
                if (!val) return defaultVal;
                if (key === STORAGE_KEYS.deleted) return new Set(JSON.parse(val));
                return JSON.parse(val);
            } catch {
                return defaultVal;
            }
        }

        function save(key, val) {
            try {
                if (val instanceof Set) {
                    localStorage.setItem(key, JSON.stringify([...val]));
                } else {
                    localStorage.setItem(key, JSON.stringify(val));
                }
            } catch {}
        }

        // Inicializar dados
        function initData() {
            generatedKeys = load(STORAGE_KEYS.keys, []);
            apiKeys = load(STORAGE_KEYS.apiKeys, []);
            packages = load(STORAGE_KEYS.packages, []);
            limitCount = load(STORAGE_KEYS.limit, 0);
            chartData = load(STORAGE_KEYS.chartData, {});
            deletedIds = load(STORAGE_KEYS.deleted, new Set());
        }

        // Renderizar página
        function renderPage(page) {
            currentPage = page;
            const root = document.getElementById('root');
            
            if (page === 'home') {
                root.innerHTML = renderHome();
            } else if (page === 'keys') {
                root.innerHTML = renderKeysPage();
            } else if (page === 'devices') {
                root.innerHTML = renderDevicesPage();
            } else if (page === 'packages') {
                root.innerHTML = renderPackagesPage();
            } else if (page === 'profile') {
                root.innerHTML = renderProfilePage();
            }
            
            updateNav();
        }

        function updateNav() {
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelector(`[data-page="${currentPage}"]`)?.classList.add('active');
        }
